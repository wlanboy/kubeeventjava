<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Kubernetes Events Viewer</title>
    <link rel="stylesheet" href="/style.css">
</head>

<body>

    <main class="container">

        <h1>Kubernetes Events</h1>

        <nav>
            <ul>
                <li><a href="#" data-tab="stream" class="tab active">Stream</a></li>
                <li><a href="#" data-tab="search" class="tab">Suche</a></li>
                <li><a href="#" data-tab="stats" class="tab">Stats</a></li>
            </ul>
        </nav>

        <!-- STREAM TAB -->
        <section id="tab-stream" class="tab-content active">
            <fieldset role="group" class="toolbar">
                <input id="streamFilter" type="search" placeholder="Filter (Type, Reason, Message, Name, Namespace...)">

                <select id="limitSelect" class="limit-select">
                    <option value="20">20 Events</option>
                    <option value="50">50 Events</option>
                    <option value="100" selected>100 Events</option>
                </select>

                <button class="outline btn-auto"
                    onclick="document.getElementById('streamFilter').value=''; renderStream();">
                    Reset
                </button>
            </fieldset>

            <div class="table-container">
                <table id="streamTable">
                    <thead>
                        <tr>
                            <th>Time</th>
                            <th>Type</th>
                            <th>Reason</th>
                            <th>Message</th>
                            <th>Object</th>
                        </tr>
                    </thead>
                    <tbody id="streamBody"></tbody>
                </table>
            </div>
            <nav aria-label="Pagination">
                <ul id="streamPagination"></ul>
            </nav>

        </section>

        <!-- SEARCH TAB -->
        <section id="tab-search" class="tab-content">
            <fieldset role="group" class="toolbar">
                <input id="searchInput" placeholder="Suchtext...">
                <button id="searchBtn">Suchen</button>
            </fieldset>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Time</th>
                            <th>Type</th>
                            <th>Reason</th>
                            <th>Message</th>
                            <th>Object</th>
                        </tr>
                    </thead>
                    <tbody id="searchResults"></tbody>
                </table>
            </div>

            <nav aria-label="Pagination">
                <ul id="searchPagination"></ul>
            </nav>

        </section>

        <!-- STATS TAB -->
        <section id="tab-stats" class="tab-content">
            <h3>Statistiken</h3>
            <div id="statsList" class="stats-container"></div>
        </section>

    </main>

    <script src="/app.js"></script>

</body>

</html>
