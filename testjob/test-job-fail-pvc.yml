apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: test-pvc-fail
  namespace: kubeeventjava
  labels:
    app: test-job-fail-pvc
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: does-not-exist
  resources:
    requests:
      storage: 100Mi
---
apiVersion: batch/v1
kind: Job
metadata:
  name: test-job-fail-pvc
  namespace: kubeeventjava
  labels:
    app: test-job-fail-pvc
spec:
  backoffLimit: 2
  template:
    metadata:
      labels:
        app: test-job-fail-pvc
    spec:
      restartPolicy: OnFailure
      containers:
        - name: test
          image: busybox:1.36
          command: ["sh", "-c", "echo 'job with pvc'; exit 0"]
          resources:
            requests:
              cpu: "10m"
              memory: "16Mi"
            limits:
              cpu: "50m"
              memory: "32Mi"
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: test-pvc-fail
