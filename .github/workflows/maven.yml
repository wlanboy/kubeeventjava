name: Java CI with Maven

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
    - name: Set up JDK 
      uses: actions/setup-java@v5
      with:
        java-version: 25
        distribution: 'temurin'
        cache: maven  
    - name: Build with Maven
      run: mvn -B package -DskipTests --file ./pom.xml
