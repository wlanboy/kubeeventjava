# ─────────────────────────────────────────────────────────────────────────────
# Docker Hub Credentials Secret – TEMPLATE
# DO NOT commit filled-in values to version control.
#
# How to create the base64 value:
#   echo -n '{"auths":{"https://index.docker.io/v1/":{"username":"YOUR_USER","password":"YOUR_TOKEN","auth":"BASE64(user:token)"}}}' \
#     | base64 -w0
#
# Or generate it with docker:
#   docker login                          # login interactively
#   cat ~/.docker/config.json | base64 -w0
#
# Then replace REPLACE_WITH_BASE64_DOCKER_CONFIG_JSON below and apply:
#   kubectl apply -f secret-template.yaml
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: dockerhub-credentials
  labels:
    app.kubernetes.io/name: kubeeventjava
type: Opaque
data:
  # base64-encoded content of ~/.docker/config.json
  config.json: REPLACE_WITH_BASE64_DOCKER_CONFIG_JSON
